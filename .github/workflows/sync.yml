name: Daily Price Sync

on:
  schedule:
    # Runs at 00:00 UTC every Monday and Thursday (Twice a week)
    - cron: '0 0 * * 1,4' 
  workflow_dispatch: # Manual run karne ke liye

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          # Removed cache: 'pip' to prevent the missing requirements.txt error

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install woocommerce

      - name: Run Sync Script
        env:
          WC_URL: ${{ secrets.WC_URL }}
          WC_KEY: ${{ secrets.WC_KEY }}
          WC_SECRET: ${{ secrets.WC_SECRET }}
        run: python sync_data.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Sirf catalog.json tabhi add karega agar file exist karti hai
          if [ -f catalog.json ]; then
            git add catalog.json
            # Agar koi change nahi hai toh exit 0 (failure nahi dikhayega)
            git commit -m "Update Catalog [skip ci]" || echo "No changes to commit"
            git push origin main || echo "Nothing to push"
          else
            echo "catalog.json not found, skipping commit."
          fi
